<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="icon" href="../imgs/PSI.png">
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>ATRP</title>
	<link rel="stylesheet" href="css/dashstyle.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<!-- Navbar (Topbar) -->
	<nav class="navbar navbar-dark bg-white border-bottom sticky-top">
		<div class="container-fluid">
		<button class="btn btn-link text-black" id="toggleBtn" aria-label="Toggle sidebar">
				<span class="navbar-toggler-icon"></span>
			</button>
			<span class="navbar-brand mb-0 h1 text-primary">ATRP</span>
			<span class="ms-auto text-dark">Welcome, User</span>
		</div>
	</nav>

	<!-- Sidebar -->
	<aside class="sidebar" id="sidebar">
		<div class="sidebar-logo">
			<img src="imgs/PSI.png" alt="PSI Logo">
		</div>
		<nav class="nav flex-column ps-2">
			<a class="nav-link" href="#">Dashboard</a>
			<a class="nav-link" href="#">Projects</a>
			<a class="nav-link" href="#">Reports</a>
			<a class="nav-link" href="#">Settings</a>
		</nav>
	</aside>

	<!-- Main Content -->
	<main class="p-4">
		<div class="container-fluid">
			<h1 class="mb-4">Dashboard</h1>
			<div class="card">
				<div class="card-body">
					<p>This is the main content area. The topbar is fixed and the sidebar can be toggled.</p>
				</div>
			</div>
		</div>
	</main>

	<!-- Bootstrap 5 JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<!-- Custom Script -->
	<script src="js/index.js"></script>
</body>
</html>
