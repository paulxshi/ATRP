<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ATRP Dashboard</title>
  <link rel="icon" type="image/png" href="../imgs/psi.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Work+Sans:wght@300;400;500;600;700&family=Nevis&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/dashstyle.css">
  <link rel="stylesheet" href="../css/table.css">
<style>
/* ─── Page header ────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.ss-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  display: flex; flex-direction: column; gap: 24px;
  animation: fadeUp .45s ease both;
}
.ss-eyebrow {
  display: block;
  font-family: var(--ff-display); font-size: 10px;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px;
}
.ss-title { font-family: var(--ff-display); font-size: 28px; font-weight: 800; line-height: 1; }
.ss-title-accent { color: var(--gold); }

/* ─── Card ───────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,.07);
}

/* ─── Legend bar ─────────────────────────────────── */
.legend-bar {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border2);
  background: #FDFCFA;
}
.legend-chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 12px 5px 8px;
  border-radius: 20px;
  border: 1px solid transparent;
  font-family: var(--ff-body); font-size: 11.5px; font-weight: 500;
  color: #fff;
  transition: transform .15s, box-shadow .15s;
}
.legend-chip:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
.legend-chip-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.55); flex-shrink: 0; }
.chip-eye   { background: #1447e6; border-color: rgba(20,71,230,.4); color: #fff; }
.chip-basic { background: #00c950; border-color: rgba(0,201,80,.4); }
.chip-ident { background: #facc15; border-color: rgba(250,204,21,.4); color: #000; }
.chip-adv   { background: #86198f; border-color: rgba(134,25,143,.4); }

/* ─── Table scroll ── */
.table-scroll {
  overflow-y: auto; overflow-x: auto;
  min-height: 200px; max-height: 400px;
  padding-bottom: 120px;
}
.table-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
.table-scroll::-webkit-scrollbar-track { background: transparent; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ─── Table ──────────────────────────────────────── */
.ss-table {
  min-height: 250px;
  min-width: 450px;
  width: 100%; border-collapse: collapse;
  font-family: var(--ff-body);
  table-layout: fixed;
}
.ss-table thead { position: sticky; top: 0; z-index: 10; }
.ss-table thead tr {
  background: linear-gradient(90deg, #C9A84C 0%, #E8CA7A 50%, #C9A84C 100%);
  border-bottom: 2px solid var(--gold);
}
.ss-table th {
  padding: 16px 16px;
  font-family: 'Nevis', sans-serif;
  font-size: 10px; font-weight: 800;
  letter-spacing: .15em; text-transform: uppercase;
  color: #000;
  border-right: 1px solid rgba(255,255,255,.06);
  white-space: nowrap;
}
.ss-table th:last-child { border-right: none; }

.c-sub  { width: 22%; }
.c-skl  { width: 24%; }
.c-crit { width: 16%; }
.c-succ { width: 13%; }
.c-sc   { width: 12%; }

.ss-table tbody tr {
  border-bottom: 1px solid var(--border2);
  transition: background .15s;
}
.ss-table tbody tr:nth-child(odd)  { background: #fff; }
.ss-table tbody tr:nth-child(even) { background: #FAFAF7; }
.ss-table tbody tr:hover           { background: rgba(201,168,76,.035); }
.ss-table tbody tr:last-child      { border-bottom: none; }
.ss-table td {
  padding: 0;
  border-right: 1px solid var(--border2);
  vertical-align: middle;
}
.ss-table td:last-child { border-right: none; }

.crit-wrap {
  padding: 0 14px;
  display: flex; align-items: center; justify-content: center;
  height: 100%; min-height: 52px;
}

.attempts-field {
  display: flex; align-items: baseline; gap: 5px;
}
.attempts-input {
  width: 36px;
  background: transparent;
  border: none;
  border-bottom: 1.5px solid rgba(201,168,76,.45);
  font-family: var(--ff-body);
  font-size: 15px; font-weight: 700;
  color: #7a5c1e;
  text-align: center;
  outline: none;
  padding: 2px 0 3px;
  transition: border-color .18s, color .18s;
}
.attempts-input:focus { border-color: var(--gold); color: #3d2b00; }
.attempts-input::-webkit-inner-spin-button,
.attempts-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.attempts-unit {
  font-family: var(--ff-body);
  font-size: 11px; font-weight: 500;
  color: #b0966a;
  letter-spacing: .03em;
  white-space: nowrap;
}

.score-wrap {
  padding: 0 14px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  height: 100%; min-height: 52px;
}
.score-input {
  width: 36px;
  background: transparent;
  border: none;
  border-bottom: 1.5px solid rgba(0,0,0,.15);
  font-family: var(--ff-body); font-size: 15px; font-weight: 700;
  text-align: center; color: var(--text);
  outline: none;
  padding: 2px 0 3px;
  transition: border-color .18s, color .18s;
}
.score-input:focus { border-color: var(--gold); color: #3d2b00; }
.score-input::-webkit-inner-spin-button,
.score-input::-webkit-outer-spin-button { -webkit-appearance: none; }

.score-pct {
  font-size: 13px; font-weight: 800;
  color: var(--gold); min-width: 36px;
  text-align: right; letter-spacing: -.02em;
}

/* ─────────────────────────────────────────────────
   CUSTOM SELECT DROPDOWN
───────────────────────────────────────────────── */
.custom-select-wrap {
  position: relative;
  padding: 6px 10px;
  user-select: none;
}
.cs-trigger {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 4px 6px 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .18s;
  min-height: 32px;
}
.cs-trigger:hover { background: rgba(0,0,0,.04); }
.cs-trigger.open  { background: rgba(201,168,76,.08); }
.cs-swatch { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: background .2s; }
.cs-label {
  flex: 1;
  font-family: var(--ff-body); font-size: 12px; font-weight: 500;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1;
}
.cs-label.placeholder { color: #bbb; font-weight: 400; font-size: 11.5px; }
.cs-chevron { width: 11px; height: 11px; flex-shrink: 0; color: #ccc; transition: transform .2s, color .2s; }
.cs-trigger.open .cs-chevron { transform: rotate(180deg); color: var(--gold); }
.cs-panel {
  position: absolute;
  top: calc(100% - 6px); left: 12px; right: 12px;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 12px 36px rgba(0,0,0,.13);
  z-index: 999;
  overflow: hidden;
  opacity: 0; transform: translateY(-6px) scale(.98);
  pointer-events: none;
  transition: opacity .15s ease, transform .15s ease;
}
.cs-panel.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }
.cs-option {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  transition: background .12s;
  border-bottom: 1px solid var(--border2);
}
.cs-option:last-child { border-bottom: none; }
.cs-option:hover { background: var(--bg); }
.cs-option.selected { background: var(--gold-soft); }
.cs-opt-bar { width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0; }
.cs-opt-label { font-family: var(--ff-body); font-size: 12.5px; font-weight: 500; color: var(--text); flex: 1; }
.cs-opt-check { width: 14px; height: 14px; opacity: 0; color: var(--gold); transition: opacity .15s; }
.cs-option.selected .cs-opt-check { opacity: 1; }

/* ─────────────────────────────────────────────────
   TYPEABLE SKILL CELL
───────────────────────────────────────────────── */
.skill-wrap {
  display: flex; align-items: center;
  height: 100%; min-height: 56px;
  padding: 10px 14px;
}
.skill-input {
  width: 100%;
  padding: 6px 12px;
  border: none; outline: none;
  border-radius: 7px;
  background: var(--skill-bg, rgba(200,200,200,.13));
  font-family: var(--ff-body); font-size: 13px; font-weight: 700;
  color: var(--skill-color, #555);
  transition: background .22s ease, color .22s ease, box-shadow .18s;
  letter-spacing: .01em;
}
.skill-input::placeholder { color: rgba(0,0,0,.25); font-weight: 400; }
.skill-input:focus { box-shadow: 0 0 0 2px var(--skill-color, #ccc); outline: none; }

/* ─── Footer ─────────────────────────────────────── */
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 18px;
  border-top: 1px solid var(--border2);
}
.footer-row-actions { display: flex; gap: 8px; }
.btn-row {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-family: var(--ff-body); font-size: 12.5px; font-weight: 600;
  cursor: pointer;
  transition: background .18s, color .18s, box-shadow .18s, transform .12s, opacity .18s;
  border: 1.5px solid transparent;
}
.btn-row svg { width: 13px; height: 13px; }
.btn-row:active { transform: scale(.97); }
.btn-row:disabled { opacity: .35; cursor: not-allowed; }
.btn-add { background: #000; color: #ffffff; border-color: rgba(201,168,76,.3); }
.btn-add:hover:not(:disabled) { background: #111; color: #fff; box-shadow: 0 3px 10px rgba(201,168,76,.3); transform: translateY(-1px); }
.btn-del {
  display: flex; align-items: center; gap: 7px; padding: 7px 15px;
  background: transparent; color: #d32f2f;
  font-family: var(--ff-display); font-size: 11px; font-weight: 600;
  letter-spacing: .08em; border: 1px solid #d32f2f; border-radius: 8px;
  cursor: pointer; transition: background .2s, border-color .2s;
}
.btn-del:hover:not(:disabled) { background: rgba(211,47,47,0.08); border-color: #d32f2f; transform: translateY(-1px); }

.btn-save {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px;
  color: #FAFAF7; background: #000;
  border: none; border-radius: 9px;
  font-family: var(--ff-display); font-size: 13px; font-weight: 700;
  letter-spacing: .04em; cursor: pointer;
  transition: background .2s, transform .15s, box-shadow .2s;
  box-shadow: 0 4px 14px rgba(201,168,76,.35);
}
.btn-save:hover { background: #111; box-shadow: 0 6px 20px rgba(0,0,0,.2); transform: translateY(-1px); }
.btn-save:active { transform: translateY(0); }
.btn-save svg { width: 14px; height: 14px; }

/* ═══════════════════════════════════════════════════
   SUBSKILL SUMMARY SECTION
═══════════════════════════════════════════════════ */
@keyframes summaryFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.summary-section {
  border-top: 1px solid var(--border2);
  background: #FDFCFA;
  padding: 18px 20px 20px;
  animation: summaryFadeIn .35s ease both;
}

.summary-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}

.summary-title {
  font-family: 'Nevis', sans-serif;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: #8a7a5a;
}

.summary-meta {
  font-family: var(--ff-body);
  font-size: 11px;
  font-weight: 500;
  color: #bbb;
  letter-spacing: .03em;
}

.summary-meta strong {
  color: #7a6030;
  font-weight: 700;
}

/* Grid of tier cards */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

@media (max-width: 720px) {
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 420px) {
  .summary-grid { grid-template-columns: 1fr; }
}

/* Individual tier card */
.tier-card {
  border-radius: 12px;
  border: 1.5px solid;
  padding: 13px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  overflow: hidden;
  transition: transform .18s, box-shadow .18s;
}
.tier-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.08); }

/* Inactive state — no drills assigned yet */
.tier-card.inactive {
  background: #F7F5F0;
  border-color: #E8E4DC;
  opacity: .55;
}

/* Accent corner glow */
.tier-card::before {
  content: '';
  position: absolute;
  top: -18px; right: -18px;
  width: 56px; height: 56px;
  border-radius: 50%;
  opacity: .12;
  transition: opacity .2s;
}
.tier-card:hover::before { opacity: .2; }

/* Card top row: badge + count pill */
.tc-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tc-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px 3px 6px;
  border-radius: 20px;
  font-family: var(--ff-body);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .03em;
  color: #fff;
}
.tc-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,.6);
  flex-shrink: 0;
}

.tc-count-pill {
  font-family: var(--ff-body);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: .04em;
  transition: background .2s, color .2s;
}

/* Card stat: big number + label */
.tc-stat {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.tc-pct {
  font-family: var(--ff-display);
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.03em;
}
.tc-pct-symbol {
  font-size: 14px;
  font-weight: 700;
  opacity: .7;
}
.tc-pct-empty {
  font-family: var(--ff-display);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -.01em;
  color: #ccc;
  line-height: 1;
}

/* Fraction subtitle */
.tc-fraction {
  font-family: var(--ff-body);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .02em;
}

/* Progress bar */
.tc-bar-track {
  height: 4px;
  border-radius: 3px;
  overflow: hidden;
}
.tc-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
  min-width: 0;
}

/* Drills list — small tags */
.tc-drills {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  min-height: 18px;
}
.tc-drill-tag {
  font-family: var(--ff-body);
  font-size: 9.5px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 6px;
  letter-spacing: .02em;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tc-drill-tag.unnamed {
  opacity: .45;
  font-style: italic;
}

/* ── Color themes per tier ── */
/* Eye Contact — blue */
.tier-card.t-eye {
  background: linear-gradient(135deg, #F5F8FF 0%, #E8EEFF 100%);
  border-color: rgba(20,71,230,.25);
}
.tier-card.t-eye::before { background: #1447e6; }
.tier-card.t-eye .tc-pct          { color: #1447e6; }
.tier-card.t-eye .tc-fraction     { color: #6b8dd4; }
.tier-card.t-eye .tc-bar-track    { background: rgba(20,71,230,.15); }
.tier-card.t-eye .tc-bar-fill     { background: linear-gradient(90deg, #1447e6, #5B8DEF); }
.tier-card.t-eye .tc-drill-tag    { background: rgba(20,71,230,.12); color: #1447e6; }
.tier-card.t-eye .tc-count-pill   { background: rgba(20,71,230,.18); color: #1447e6; }

/* Basic Understanding — green */
.tier-card.t-basic {
  background: linear-gradient(135deg, #F5FDF8 0%, #E8F7EE 100%);
  border-color: rgba(0,201,80,.2);
}
.tier-card.t-basic::before { background: #00c950; }
.tier-card.t-basic .tc-pct          { color: #00c950; }
.tier-card.t-basic .tc-fraction     { color: #5a9070; }
.tier-card.t-basic .tc-bar-track    { background: rgba(0,201,80,.12); }
.tier-card.t-basic .tc-bar-fill     { background: linear-gradient(90deg, #00c950, #4CAF7A); }
.tier-card.t-basic .tc-drill-tag    { background: rgba(0,201,80,.10); color: #00c950; }
.tier-card.t-basic .tc-count-pill   { background: rgba(0,201,80,.12); color: #00c950; }

/* Identification — yellow */
.tier-card.t-ident {
  background: linear-gradient(135deg, #FFFEF5 0%, #FFFDE8 100%);
  border-color: rgba(250,204,21,.25);
}
.tier-card.t-ident::before { background: #facc15; }
.tier-card.t-ident .tc-pct          { color: #a38f10; }
.tier-card.t-ident .tc-fraction     { color: #b8a545; }
.tier-card.t-ident .tc-bar-track    { background: rgba(250,204,21,.15); }
.tier-card.t-ident .tc-bar-fill     { background: linear-gradient(90deg, #facc15, #F7DE5C); }
.tier-card.t-ident .tc-drill-tag    { background: rgba(250,204,21,.15); color: #a38f10; }
.tier-card.t-ident .tc-count-pill   { background: rgba(250,204,21,.2); color: #a38f10; }

/* Advanced Understanding — purple */
.tier-card.t-adv {
  background: linear-gradient(135deg, #F8F5FF 0%, #EDE8FF 100%);
  border-color: rgba(134,25,143,.2);
}
.tier-card.t-adv::before { background: #86198f; }
.tier-card.t-adv .tc-pct          { color: #86198f; }
.tier-card.t-adv .tc-fraction     { color: #9a5bb8; }
.tier-card.t-adv .tc-bar-track    { background: rgba(134,25,143,.12); }
.tier-card.t-adv .tc-bar-fill     { background: linear-gradient(90deg, #86198f, #A855F7); }
.tier-card.t-adv .tc-drill-tag    { background: rgba(134,25,143,.10); color: #86198f; }
.tier-card.t-adv .tc-count-pill   { background: rgba(134,25,143,.12); color: #86198f; }
.tier-card.t-adv .tc-bar-fill     { background: linear-gradient(90deg, #5A4FB0, #8B80D8); }
.tier-card.t-adv .tc-drill-tag    { background: rgba(90,79,176,.10); color: #3a308a; }
.tier-card.t-adv .tc-count-pill   { background: rgba(90,79,176,.12); color: #3a308a; }
</style>
</head>
<body>

<!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left" id="topbarLeft">
      <div class="brand-logo">
        <img src="../imgs/psi.png" alt="PSI Logo">
      </div>
      <span class="brand-text">ATRP</span>
    </div>
    <div class="topbar-right">
      <button class="toggle-btn" id="toggleBtn" aria-label="Toggle sidebar">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <a class="nav-item" href="index.html">
      <span class="nav-icon"><i class="fas fa-chart-line"></i></span>
      <span class="nav-label">Behavior</span>
      <span class="tooltip-text">Behavior</span>
    </a>
    <a class="nav-item active" href="skillscoring.html">
      <span class="nav-icon"><i class="fas fa-clipboard-list"></i></span>
      <span class="nav-label">Skill Scoring</span>
      <span class="nav-badge">Live</span>
      <span class="tooltip-text">Skill Scoring</span>
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon"><i class="fas fa-file-alt"></i></span>
      <span class="nav-label">Reports</span>
      <span class="tooltip-text">Reports</span>
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon"><i class="fas fa-layer-group"></i></span>
      <span class="nav-label">Analytics</span>
      <span class="tooltip-text">Analytics</span>
    </a>
  </aside>

<!-- MAIN -->
<main class="main">
<div class="ss-wrapper">

  <!-- Header -->
  <div>
    <span class="ss-eyebrow">Skills Assessment</span>
    <h1 class="ss-title">Skills <span class="ss-title-accent">Scoring</span> Sheet</h1>
  </div>

  <!-- Card -->
  <div class="measurement-container">

    <!-- Legend -->
    <div class="legend-bar">
      <span class="legend-chip chip-eye">  <span class="legend-chip-dot"></span>Eye Contact</span>
      <span class="legend-chip chip-basic"><span class="legend-chip-dot"></span>Basic Understanding</span>
      <span class="legend-chip chip-ident"><span class="legend-chip-dot"></span>Identification</span>
      <span class="legend-chip chip-adv">  <span class="legend-chip-dot"></span>Advanced Understanding</span>
    </div>

    <div class="table-scroll">
      <table class="ss-table">
        <colgroup>
          <col class="c-sub"/>
          <col class="c-skl"/>
          <col class="c-crit"/>
          <col class="c-succ"/>
          <col class="c-sc"/>
        </colgroup>
        <thead>
          <tr>
            <th class="c-sub">Subskill Level</th>
            <th class="c-skl">Drills</th>
            <th class="c-crit">No. of Attempts</th>
            <th class="c-succ" style="text-align:center">Successful</th>
            <th class="c-sc"   style="text-align:center">Score</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Footer: add/delete buttons -->
    <div class="card-footer">
      <div class="footer-row-actions">
        <button class="btn-row btn-add" id="btnAddRow">
          <svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Add Row
        </button>
        <button class="btn-row btn-del" id="btnDelRow">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M6 7v4M8 7v4M3 4l1 8c0 .6.4 1 1 1h4c.6 0 1-.4 1-1l1-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Delete Row
        </button>
      </div>
    </div>

    <!-- ══ SUBSKILL SUMMARY ══ -->
    <div class="summary-section">
      <div class="summary-header">
        <span class="summary-title">Subskill Summary Score</span>
        <span class="summary-meta" id="summaryMeta">—</span>
      </div>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>

    <div class="bcm-footer bcm-footer-bottom">
      <div class="bcm-footer-actions">
        <button class="btn-save" id="btnSave">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M11.5 7.5l-4 4-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Save &amp; Submit
        </button>
      </div>
    </div>

  </div><!-- /.measurement-container -->

</div><!-- /.ss-wrapper -->
</main>

<script>
(function () {

  /* ── Tier data ── */
  const TIERS = [
    { key: 'eye',   label: 'Eye Contact',            color: '#1447e6', cls: 't-eye'   },
    { key: 'basic', label: 'Basic Understanding',    color: '#00c950', cls: 't-basic' },
    { key: 'ident', label: 'Identification',        color: '#facc15', cls: 't-ident' },
    { key: 'adv',   label: 'Advanced Understanding', color: '#86198f', cls: 't-adv'   },
  ];

  const DRILLS = [
    { skill: '', attempts: 5, tier: null, succ: '' },
    { skill: '', attempts: 5, tier: null, succ: '' },
  ];

  /* ── Helpers ── */
  function tierByKey(k) { return TIERS.find(t => t.key === k) || null; }

  function hexToRgb(hex) {
    const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? parseInt(r[1],16)+','+parseInt(r[2],16)+','+parseInt(r[3],16) : '180,180,180';
  }

  function recalcPct(idx) {
    const max    = parseInt(DRILLS[idx].attempts) || 0;
    const succEl = document.getElementById('succ-'+idx);
    const v      = succEl ? parseFloat(succEl.value) : NaN;
    const p      = (!isNaN(v) && max > 0) ? Math.min(100, Math.round((v / max) * 100)) : null;
    const pctEl  = document.getElementById('pct-'+idx);
    if (pctEl) pctEl.textContent = p !== null ? p + '%' : '\u2014';
    renderSummary();
  }

  function closeAll() {
    document.querySelectorAll('.cs-panel.open').forEach(p => {
      p.classList.remove('open');
      const trigger = document.getElementById(p.id.replace('cs-panel','cs-trigger'));
      if (trigger) trigger.classList.remove('open');
    });
  }

  function applyTierToRow(idx, tierKey) {
    const tier  = tierByKey(tierKey);
    const color = tier ? tier.color : null;
    const rgb   = color ? hexToRgb(color) : '180,180,180';
    const input = document.getElementById('skill-input-'+idx);
    if (input) {
      input.style.color      = color || '#bbb';
      input.style.background = color ? 'rgba('+rgb+',0.13)' : 'rgba(180,180,180,0.10)';
    }
  }

  /* ═══════════════════════════════════════════════
     SUMMARY RENDERER
  ═══════════════════════════════════════════════ */
  function renderSummary() {
    const grid     = document.getElementById('summaryGrid');
    const metaEl   = document.getElementById('summaryMeta');
    if (!grid) return;

    /* Aggregate per tier */
    const agg = {};
    TIERS.forEach(function(t) {
      agg[t.key] = { count: 0, totalAttempts: 0, totalSucc: 0, drills: [] };
    });

    let totalSelected = 0;
    DRILLS.forEach(function(d) {
      if (!d.tier) return;
      const a   = agg[d.tier];
      const att = parseInt(d.attempts) || 0;
      const suc = parseFloat(d.succ);
      a.count++;
      a.totalAttempts += att;
      if (!isNaN(suc)) a.totalSucc += suc;
      a.drills.push(d.skill || null);
      totalSelected++;
    });

    /* Meta line */
    const totalRows = DRILLS.length;
    if (totalSelected === 0) {
      metaEl.innerHTML = '<strong>0</strong> of ' + totalRows + ' rows assigned';
    } else {
      metaEl.innerHTML = '<strong>' + totalSelected + '</strong> of ' + totalRows + ' rows assigned';
    }

    /* Build cards */
    grid.innerHTML = '';
    TIERS.forEach(function(t) {
      const a   = agg[t.key];
      const pct = (a.totalAttempts > 0)
        ? Math.min(100, Math.round((a.totalSucc / a.totalAttempts) * 100))
        : null;
      const inactive = a.count === 0;

      const card = document.createElement('div');
      card.className = 'tier-card ' + t.cls + (inactive ? ' inactive' : '');

      /* Badge */
      const badgeHTML =
        '<div class="tc-top">' +
          '<span class="tc-badge" style="background:' + t.color + '">' +
            '<span class="tc-badge-dot"></span>' +
            t.label +
          '</span>' +
          '<span class="tc-count-pill">' +
            (a.count === 0 ? 'None' : a.count + (a.count === 1 ? ' skill' : ' skills')) +
          '</span>' +
        '</div>';

      /* Score stat */
      let statHTML;
      if (inactive || pct === null) {
        statHTML =
          '<div class="tc-stat"><span class="tc-pct-empty">—</span></div>' +
          '<span class="tc-fraction" style="color:#ccc">No data yet</span>';
      } else {
        statHTML =
          '<div class="tc-stat">' +
            '<span class="tc-pct">' + pct + '</span>' +
            '<span class="tc-pct-symbol">%</span>' +
          '</div>' +
          '<span class="tc-fraction">' +
            a.totalSucc + ' / ' + a.totalAttempts + ' attempts' +
          '</span>';
      }

      /* Progress bar */
      const barHTML =
        '<div class="tc-bar-track">' +
          '<div class="tc-bar-fill" style="width:' + (pct !== null ? pct : 0) + '%"></div>' +
        '</div>';

      /* Drill tags */
      let tagsHTML = '<div class="tc-drills">';
      if (a.drills.length === 0) {
        tagsHTML += '<span class="tc-drill-tag unnamed">No drills assigned</span>';
      } else {
        a.drills.forEach(function(name) {
          if (name) {
            tagsHTML += '<span class="tc-drill-tag">' + name + '</span>';
          } else {
            tagsHTML += '<span class="tc-drill-tag unnamed">Unnamed drill</span>';
          }
        });
      }
      tagsHTML += '</div>';

      card.innerHTML = badgeHTML + statHTML + barHTML + tagsHTML;
      grid.appendChild(card);
    });
  }

  /* ── Build one table row ── */
  function buildRow(drill, idx) {
    const tier     = tierByKey(drill.tier);
    const color    = tier ? tier.color : null;
    const rgb      = color ? hexToRgb(color) : '180,180,180';
    const skillBg  = color ? 'rgba('+rgb+',0.13)' : 'rgba(180,180,180,0.10)';
    const skillTxt = color || '#bbb';

    const tr = document.createElement('tr');

    /* 1. Subskill dropdown */
    const tdSub = document.createElement('td');
    tdSub.className = 'c-sub';
    tdSub.innerHTML =
      '<div class="custom-select-wrap">'+
        '<div class="cs-trigger" id="cs-trigger-'+idx+'" data-idx="'+idx+'">'+
          '<span class="cs-swatch" id="cs-swatch-'+idx+'" style="background:'+(color||'#ddd')+'"></span>'+
          '<span class="cs-label'+(tier?'':' placeholder')+'" id="cs-label-'+idx+'">'+(tier?tier.label:'Choose subskill…')+'</span>'+
          '<svg class="cs-chevron" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
        '</div>'+
        '<div class="cs-panel" id="cs-panel-'+idx+'">'+
          TIERS.map(function(t){
            return '<div class="cs-option'+(drill.tier===t.key?' selected':'')+'" data-idx="'+idx+'" data-key="'+t.key+'" data-color="'+t.color+'">'+
              '<span class="cs-opt-bar" style="background:'+t.color+'"></span>'+
              '<span class="cs-opt-label">'+t.label+'</span>'+
              '<svg class="cs-opt-check" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
            '</div>';
          }).join('')+
        '</div>'+
      '</div>';
    tr.appendChild(tdSub);

    /* 2. Skill input */
    const tdSkill = document.createElement('td');
    tdSkill.className = 'c-skl';
    tdSkill.innerHTML =
      '<div class="skill-wrap">'+
        '<input type="text" class="skill-input" id="skill-input-'+idx+'" data-idx="'+idx+'"'+
          ' placeholder="Enter skill name…" value="'+drill.skill+'"'+
          ' style="color:'+skillTxt+'; background:'+skillBg+';" />'+
      '</div>';
    tr.appendChild(tdSkill);

    /* 3. Attempts */
    const tdCrit = document.createElement('td');
    tdCrit.className = 'c-crit';
    tdCrit.innerHTML =
      '<div class="crit-wrap">'+
        '<div class="attempts-field">'+
          '<input type="number" class="attempts-input" id="attempts-'+idx+'" data-idx="'+idx+'"'+
            ' min="1" value="'+(drill.attempts||5)+'" placeholder="5" />'+
          '<span class="attempts-unit">tries</span>'+
        '</div>'+
      '</div>';
    tr.appendChild(tdCrit);

    /* 4. Successful */
    const tdSucc = document.createElement('td');
    tdSucc.className = 'c-succ';
    tdSucc.innerHTML =
      '<div class="score-wrap">'+
        '<input type="number" class="score-input" id="succ-'+idx+'" data-idx="'+idx+'"'+
          ' placeholder="0" min="0" value="'+(drill.succ||'')+'" />'+
      '</div>';
    tr.appendChild(tdSucc);

    /* 5. Score % */
    const tdScore = document.createElement('td');
    tdScore.className = 'c-sc';
    const max = parseInt(drill.attempts) || 0;
    const v   = parseFloat(drill.succ);
    const p   = (!isNaN(v) && max > 0) ? Math.min(100, Math.round((v/max)*100)) : null;
    tdScore.innerHTML =
      '<div class="score-wrap">'+
        '<span class="score-pct" id="pct-'+idx+'">'+(p!==null?p+'%':'—')+'</span>'+
      '</div>';
    tr.appendChild(tdScore);

    return tr;
  }

  /* ── Render table ── */
  function render() {
    const body = document.getElementById('tableBody');
    body.innerHTML = '';
    DRILLS.forEach(function(d, i) { body.appendChild(buildRow(d, i)); });

    /* Dropdown triggers */
    document.querySelectorAll('.cs-trigger').forEach(function(trigger) {
      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        const idx   = +this.dataset.idx;
        const panel = document.getElementById('cs-panel-'+idx);
        const isOpen = panel.classList.contains('open');
        closeAll();
        if (!isOpen) {
          panel.classList.add('open');
          this.classList.add('open');
          setTimeout(function() {
            var scroll = document.querySelector('.table-scroll');
            var panelEl = document.getElementById('cs-panel-'+idx);
            if (scroll && panelEl) {
              var scrollRect = scroll.getBoundingClientRect();
              var panelRect  = panelEl.getBoundingClientRect();
              if (panelRect.bottom > scrollRect.bottom) {
                scroll.scrollTop += (panelRect.bottom - scrollRect.bottom + 16);
              }
            }
          }, 20);
        }
      });
    });

    /* Option clicks */
    document.querySelectorAll('.cs-option').forEach(function(opt) {
      opt.addEventListener('click', function(e) {
        e.stopPropagation();
        const idx   = +this.dataset.idx;
        const key   = this.dataset.key;
        const color = this.dataset.color;

        DRILLS[idx].tier = key;

        document.getElementById('cs-swatch-'+idx).style.background = color;
        const lbl = document.getElementById('cs-label-'+idx);
        lbl.textContent = TIERS.find(function(t){ return t.key===key; }).label;
        lbl.classList.remove('placeholder');

        document.querySelectorAll('#cs-panel-'+idx+' .cs-option').forEach(function(o){ o.classList.remove('selected'); });
        this.classList.add('selected');

        applyTierToRow(idx, key);

        document.getElementById('cs-panel-'+idx).classList.remove('open');
        document.getElementById('cs-trigger-'+idx).classList.remove('open');

        renderSummary();
      });
    });

    /* Skill input */
    document.querySelectorAll('.skill-input').forEach(function(input) {
      input.addEventListener('input', function() {
        DRILLS[+this.dataset.idx].skill = this.value;
        renderSummary();
      });
    });

    /* Attempts input */
    document.querySelectorAll('.attempts-input').forEach(function(input) {
      input.addEventListener('input', function() {
        const idx = +this.dataset.idx;
        let v = parseInt(this.value);
        if (isNaN(v) || v < 1) v = 1;
        DRILLS[idx].attempts = v;
        const succEl = document.getElementById('succ-'+idx);
        if (succEl) {
          let s = parseFloat(succEl.value);
          if (!isNaN(s) && s > v) { succEl.value = v; DRILLS[idx].succ = v; }
          succEl.max = v;
        }
        recalcPct(idx);
      });
      input.addEventListener('blur', function() {
        const idx = +this.dataset.idx;
        if (!this.value || parseInt(this.value) < 1) {
          this.value = 1;
          DRILLS[idx].attempts = 1;
          recalcPct(idx);
        }
      });
    });

    /* Successful input */
    document.querySelectorAll('.score-input').forEach(function(input) {
      input.addEventListener('input', function() {
        const idx = +this.dataset.idx;
        let v   = parseFloat(this.value);
        const max = parseInt(DRILLS[idx].attempts) || 1;
        if (!isNaN(v) && v < 0)   { this.value = 0;   v = 0; }
        if (!isNaN(v) && v > max) { this.value = max; v = max; }
        DRILLS[idx].succ = this.value;
        recalcPct(idx);
      });
    });

    const delBtn = document.getElementById('btnDelRow');
    if (delBtn) delBtn.disabled = DRILLS.length <= 1;

    renderSummary();
  }

  /* ── Add row ── */
  document.getElementById('btnAddRow').addEventListener('click', function() {
    DRILLS.push({ skill: '', attempts: 5, tier: null, succ: '' });
    render();
    var scroll = document.querySelector('.table-scroll');
    if (scroll) scroll.scrollTop = scroll.scrollHeight;
  });

  /* ── Delete last row ── */
  document.getElementById('btnDelRow').addEventListener('click', function() {
    if (DRILLS.length <= 1) return;
    DRILLS.pop();
    render();
  });

  /* ── Save ── */
  document.getElementById('btnSave').addEventListener('click', function() {
    var self = this;
    var orig = self.innerHTML;
    self.style.opacity = '.65';
    self.innerHTML = '<svg viewBox="0 0 16 16" fill="none"><path d="M13.5 4.5L6 12 2.5 8.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Saved ✓';
    setTimeout(function(){ self.style.opacity=''; self.innerHTML=orig; }, 2000);
  });

  document.addEventListener('click', closeAll);

  render();
})();
</script>
<script src="../js/index.js"></script>
<script src="../js/table.js"></script>
</body>
